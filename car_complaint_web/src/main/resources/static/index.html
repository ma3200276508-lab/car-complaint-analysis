<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汽车投诉数据可视化分析大屏</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;color:#333;font-family:'Microsoft YaHei',sans-serif}
.header{height:72px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);position:relative}
.header h1{font-size:28px;letter-spacing:6px;color:#1a1a2e;font-weight:700}
.header .time{position:absolute;right:40px;font-size:15px;color:#888}
.header .status{position:absolute;right:210px;font-size:13px}
.nav-link{position:absolute;left:24px;font-size:14px;color:#3b82f6;text-decoration:none;font-weight:600}
.nav-link:hover{text-decoration:underline}
.container{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:380px 380px 380px 380px;gap:16px;padding:20px 28px}
.panel{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.panel-brand::before{background:linear-gradient(90deg,#1e3a8a,#3b82f6)}
.panel-trend::before{background:linear-gradient(90deg,#057a55,#0d9488)}
.panel-pie::before{background:linear-gradient(90deg,#c2410c,#f97316,#eab308)}
.panel-bar2::before{background:linear-gradient(90deg,#9d174d,#ec4899)}
.panel-heat::before{background:linear-gradient(90deg,#3730a3,#6366f1)}
.panel-series::before{background:linear-gradient(90deg,#6d28d9,#a78bfa)}
.chart{width:100%;height:337px}
.panel-title{height:43px;line-height:43px;padding-left:20px;font-size:15px;font-weight:700;border-bottom:1px solid #eee}
.panel-brand .panel-title{color:#1e3a8a}
.panel-trend .panel-title{color:#057a55}
.panel-pie .panel-title{color:#c2410c}
.panel-bar2 .panel-title{color:#9d174d}
.panel-heat .panel-title{color:#3730a3}
.panel-series .panel-title{color:#6d28d9}
.full-width{grid-column:1/-1}
.loading-mask{position:absolute;inset:0;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;z-index:10}
.spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top:3px solid #3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{position:absolute;inset:0 0 43px 0;top:43px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;font-size:14px;background:rgba(255,255,255,.95);z-index:10}
.retry-btn{margin-top:10px;padding:6px 20px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.retry-btn:hover{background:#2563eb}
.toast{position:fixed;top:20px;right:20px;z-index:9999;background:#ef4444;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;box-shadow:0 4px 12px rgba(239,68,68,.3);animation:slideIn .3s}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <a class="nav-link" href="/admin.html">📋 数据管理</a>
    <h1>汽车投诉数据可视化分析大屏</h1>
    <span class="status">{{ statusText }}</span>
    <span class="time">{{ clock }}</span>
  </div>

  <!-- Toast -->
  <div v-if="toast" class="toast">{{ toast }}</div>

  <div class="container">
    <!-- 品牌TOP20 -->
    <div class="panel panel-brand">
      <div class="panel-title">投诉品牌 TOP20</div>
      <div class="chart" :id="'brand-chart'">
        <div v-if="charts.brand.loading" class="loading-mask"><div class="spinner"></div></div>
        <div v-if="charts.brand.error" class="error-box">
          <span>⚠ 数据加载失败</span>
          <button class="retry-btn" @click="loadBrand">重试</button>
        </div>
      </div>
    </div>

    <!-- 日趋势 -->
    <div class="panel panel-trend">
      <div class="panel-title">日投诉量趋势</div>
      <div class="chart" :id="'trend-chart'">
        <div v-if="charts.trend.loading" class="loading-mask"><div class="spinner"></div></div>
        <div v-if="charts.trend.error" class="error-box">
          <span>⚠ 数据加载失败</span>
          <button class="retry-btn" @click="loadTrend">重试</button>
        </div>
      </div>
    </div>

    <!-- 问题大类饼图 -->
    <div class="panel panel-pie">
      <div class="panel-title">投诉问题大类分布</div>
      <div class="chart" :id="'problem-cat-chart'">
        <div v-if="charts.cat.loading" class="loading-mask"><div class="spinner"></div></div>
        <div v-if="charts.cat.error" class="error-box">
          <span>⚠ 数据加载失败</span>
          <button class="retry-btn" @click="loadCategory">重试</button>
        </div>
      </div>
    </div>

    <!-- 问题类型TOP20 -->
    <div class="panel panel-bar2">
      <div class="panel-title">问题类型 TOP20</div>
      <div class="chart" :id="'problem-type-chart'">
        <div v-if="charts.type.loading" class="loading-mask"><div class="spinner"></div></div>
        <div v-if="charts.type.error" class="error-box">
          <span>⚠ 数据加载失败</span>
          <button class="retry-btn" @click="loadType">重试</button>
        </div>
      </div>
    </div>

    <!-- 热力图 -->
    <div class="panel panel-heat full-width">
      <div class="panel-title">品牌-问题关联热力图</div>
      <div class="chart" :id="'cross-chart'" style="height:337px">
        <div v-if="charts.cross.loading" class="loading-mask"><div class="spinner"></div></div>
        <div v-if="charts.cross.error" class="error-box">
          <span>⚠ 数据加载失败</span>
          <button class="retry-btn" @click="loadCross">重试</button>
        </div>
      </div>
    </div>

    <!-- 车系TOP15 -->
    <div class="panel panel-series full-width">
      <div class="panel-title">车系投诉量 TOP15</div>
      <div class="chart" :id="'series-chart'" style="height:337px">
        <div v-if="charts.series.loading" class="loading-mask"><div class="spinner"></div></div>
        <div v-if="charts.series.error" class="error-box">
          <span>⚠ 数据加载失败</span>
          <button class="retry-btn" @click="loadSeries">重试</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref, computed, onMounted, nextTick } = Vue;

const API = '';
const darkText = '#555';

createApp({
  setup() {
    // ===== 状态 =====
    const clock = ref('');
    const toast = ref('');
    const loadedCount = ref(0);

    const charts = ref({
      brand:  { loading: true, error: false },
      trend:  { loading: true, error: false },
      cat:    { loading: true, error: false },
      type:   { loading: true, error: false },
      cross:  { loading: true, error: false },
      series: { loading: true, error: false },
    });

    const statusText = computed(() => {
      if (loadedCount.value >= 6) return '✅ 全部加载完成';
      return `🔄 加载中 (${loadedCount.value}/6)`;
    });

    // ===== 工具 =====
    function showToast(msg, duration = 3000) {
      toast.value = msg;
      setTimeout(() => toast.value = '', duration);
    }

    function onLoaded() { loadedCount.value++; }

    // ===== 图表渲染 =====
    function renderBrand(data) {
      const chart = echarts.init(document.getElementById('brand-chart'));
      chart.setOption({
        tooltip: { trigger:'axis', axisPointer:{type:'shadow'} },
        grid: { left:100, right:60, top:10, bottom:10 },
        xAxis: { type:'value', axisLabel:{color:darkText,fontSize:11}, splitLine:{lineStyle:{color:'#eee'}} },
        yAxis: { type:'category', inverse:true, data:data.brand.slice(0,20).reverse(), axisLabel:{color:'#444',fontSize:11} },
        series: [{ type:'bar', data:data.cnt.slice(0,20).reverse(),
          itemStyle:{ borderRadius:[0,4,4,0], color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#1e3a8a'},{offset:1,color:'#3b82f6'}]) },
          label:{ show:true, position:'right', color:darkText,fontSize:10 } }]
      });
    }

    function renderTrend(data) {
      const chart = echarts.init(document.getElementById('trend-chart'));
      chart.setOption({
        tooltip:{ trigger:'axis' },
        grid:{ left:50, right:20, top:20, bottom:30 },
        xAxis:{ type:'category', data:data.date, axisLabel:{color:darkText,rotate:30,fontSize:10} },
        yAxis:{ type:'value', axisLabel:{color:darkText}, splitLine:{lineStyle:{color:'#eee'}} },
        series:[{ type:'line', data:data.cnt, smooth:true, symbol:'circle', symbolSize:4,
          lineStyle:{color:'#0d9488',width:2.5}, itemStyle:{color:'#057a55'},
          areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(13,148,136,.25)'},{offset:1,color:'rgba(13,148,136,.02)'}])}
        }]
      });
    }

    function renderCategory(data) {
      const chart = echarts.init(document.getElementById('problem-cat-chart'));
      chart.setOption({
        tooltip:{ trigger:'item', formatter:'{b}: {c} 条 ({d}%)' },
        legend:{ orient:'vertical', right:10, top:'center', textStyle:{color:'#444',fontSize:11} },
        series:[{ type:'pie', radius:['48%','78%'], center:['35%','50%'], roseType:'area',
          data:data.category.map((n,i)=>({name:n,value:data.cnt[i]})),
          label:{ formatter:'{b}\n{d}%', color:'#444',fontSize:10 } }]
      });
    }

    function renderType(data) {
      const chart = echarts.init(document.getElementById('problem-type-chart'));
      chart.setOption({
        tooltip:{ trigger:'axis', axisPointer:{type:'shadow'} },
        grid:{ left:50, right:20, top:10, bottom:80 },
        xAxis:{ type:'category', data:data.type.slice(0,20), axisLabel:{color:darkText,rotate:45,fontSize:9} },
        yAxis:{ type:'value', axisLabel:{color:darkText}, splitLine:{lineStyle:{color:'#eee'}} },
        series:[{ type:'bar', data:data.cnt.slice(0,20),
          itemStyle:{ borderRadius:[4,4,0,0], color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#ec4899'},{offset:1,color:'#9d174d'}]) } }]
      });
    }

    function renderCross(data) {
      const chart = echarts.init(document.getElementById('cross-chart'));
      const topBrands = data.brand.slice(0,15);
      const heatData = [];
      topBrands.forEach((b,bi) => data.category.forEach((c,ci) => {
        const v = data.data[bi]?.[ci] || 0;
        if (v>0) heatData.push([ci,bi,v]);
      }));
      chart.setOption({
        tooltip:{ formatter:p=>p.data[2]>0 ? data.category[p.data[0]]+'<br/>'+topBrands[p.data[1]]+': '+p.data[2]+' 条' : '' },
        grid:{ left:100, right:80, top:10, bottom:20 },
        xAxis:{ type:'category', data:data.category, axisLabel:{color:darkText,rotate:45,fontSize:10} },
        yAxis:{ type:'category', data:topBrands, axisLabel:{color:'#444',fontSize:11} },
        visualMap:{ min:0, max:100, calculable:true, orient:'vertical', right:10, bottom:40,
          inRange:{color:['#eef2ff','#c7d2fe','#a5b4fc','#818cf8','#6366f1','#4f46e5']}, textStyle:{color:darkText} },
        series:[{ type:'heatmap', data:heatData, label:{ show:true, color:'#333',fontSize:9 } }]
      });
    }

    function renderSeries(data) {
      const chart = echarts.init(document.getElementById('series-chart'));
      chart.setOption({
        tooltip:{ trigger:'axis', axisPointer:{type:'shadow'} },
        grid:{ left:180, right:60, top:10, bottom:10 },
        xAxis:{ type:'value', axisLabel:{color:darkText,fontSize:11}, splitLine:{lineStyle:{color:'#eee'}} },
        yAxis:{ type:'category', inverse:true, data:data.series.reverse(), axisLabel:{color:'#444',fontSize:11} },
        series:[{ type:'bar', data:data.cnt.reverse(),
          itemStyle:{ borderRadius:[0,4,4,0], color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#6d28d9'},{offset:1,color:'#a78bfa'}]) },
          label:{ show:true, position:'right', color:darkText,fontSize:10 } }]
      });
    }

    // ===== 通用数据加载 =====
    async function fetchChart(url, chartKey, renderFn) {
      charts.value[chartKey] = { loading: true, error: false };
      await nextTick();
      try {
        const res = await fetch(API + url);
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        renderFn(data);
        charts.value[chartKey] = { loading: false, error: false };
        onLoaded();
      } catch (e) {
        charts.value[chartKey] = { loading: false, error: true };
        showToast(`${chartKey} 加载失败: ${e.message}`);
      }
    }

    // ===== 各图加载 =====
    const loadBrand   = () => fetchChart('/api/brand/top20',       'brand',  renderBrand);
    const loadTrend   = () => fetchChart('/api/trend/daily',       'trend',  renderTrend);
    const loadCategory= () => fetchChart('/api/problem/category',  'cat',    renderCategory);
    const loadType    = () => fetchChart('/api/problem/type',      'type',   renderType);
    const loadCross   = () => fetchChart('/api/brand/problem/cross','cross',  renderCross);
    const loadSeries  = () => fetchChart('/api/series/top15',      'series', renderSeries);

    // ===== 生命周期 =====
    onMounted(() => {
      // 时钟
      const tick = () => clock.value = new Date().toLocaleString('zh-CN', { hour12: false });
      tick(); setInterval(tick, 1000);

      // 启动所有图表
      loadBrand(); loadTrend(); loadCategory(); loadType(); loadCross(); loadSeries();

      // 响应式缩放
      window.addEventListener('resize', () => {
        ['brand-chart','trend-chart','problem-cat-chart','problem-type-chart','cross-chart','series-chart']
          .forEach(id => { const i = echarts.getInstanceByDom(document.getElementById(id)); if (i) i.resize(); });
      });
    });

    return { clock, toast, statusText, charts, loadBrand, loadTrend, loadCategory, loadType, loadCross, loadSeries };
  }
}).mount('#app');
</script>
</body>
</html>
