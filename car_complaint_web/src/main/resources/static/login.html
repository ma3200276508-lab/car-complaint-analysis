<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>登录 - 汽车投诉数据分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4/dist/vue.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#60a5fa 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Microsoft YaHei',sans-serif}
.card{background:#fff;border-radius:16px;padding:48px 40px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.card h1{text-align:center;color:#1e3a8a;font-size:26px;margin-bottom:8px}
.card .sub{text-align:center;color:#888;font-size:14px;margin-bottom:32px}
.field{margin-bottom:20px}
.field label{display:block;color:#444;font-size:14px;margin-bottom:6px}
.field input{width:100%;height:44px;border:1px solid #ddd;border-radius:8px;padding:0 14px;font-size:15px;outline:none;transition:border .3s}
.field input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn{width:100%;height:44px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:background .3s}
.btn:hover{background:#2563eb}
.btn:disabled{background:#93c5fd;cursor:not-allowed}
.error{color:#ef4444;font-size:14px;text-align:center;margin-top:12px}
.hint{margin-top:16px;text-align:center;color:#aaa;font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="card">
    <h1>汽车投诉数据分析系统</h1>
    <p class="sub">请登录以管理系统</p>
    <div class="field">
      <label>用户名</label>
      <input v-model="username" @keyup.enter="login" placeholder="默认: admin">
    </div>
    <div class="field">
      <label>密码</label>
      <input v-model="password" type="password" @keyup.enter="login" placeholder="默认: admin123">
    </div>
    <button class="btn" :disabled="loading" @click="login">
      {{ loading ? '登录中...' : '登 录' }}
    </button>
    <p class="error" v-if="error">{{ error }}</p>
    <p class="hint">默认账号 admin / admin123</p>
  </div>
</div>
<script>
const { createApp, ref } = Vue;
createApp({
  setup(){
    const username=ref('admin');
    const password=ref('');
    const loading=ref(false);
    const error=ref('');

    async function login(){
      loading.value=true;error.value='';
      try{
        const res=await fetch('/api/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({username:username.value,password:password.value})
        });
        const data=await res.json();
        if(data.success){location.href='/';}
        else{error.value=data.message;}
      }catch(e){error.value='网络错误，请检查服务';}
      finally{loading.value=false;}
    }
    return {username,password,loading,error,login};
  }
}).mount('#app');
</script>
</body>
</html>
